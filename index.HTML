<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel Call Manager</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.upload-box{
    background:#fff;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card{
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    display:none;
}

.info-row{
    margin-bottom:12px;
    padding:10px;
    border-bottom:1px solid #eee;
}

.label{
    font-weight:bold;
    color:#333;
}

.value{
    color:#555;
}

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:20px;
}

button,a{
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    text-decoration:none;
    font-weight:bold;
}

.call-btn{
    background:#28a745;
    color:white;
}

.prev-btn{
    background:#6c757d;
    color:white;
}

.next-btn{
    background:#007bff;
    color:white;
}

.called-btn{
    background:#ff9800;
    color:white;
}

.search{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

.status{
    margin-top:15px;
    font-weight:bold;
}

.progress{
    margin-top:10px;
    color:#666;
}

.called{
    color:green;
    font-weight:bold;
}

.notcalled{
    color:red;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h1>📞 Excel Call Manager</h1>

<div class="upload-box">
    <input type="file" id="excelFile" accept=".xlsx,.xls,.csv">
    <input type="text" id="searchBox" class="search" placeholder="Search by name...">
</div>

<div class="card" id="memberCard">

    <div id="memberDetails"></div>

    <div class="controls">
        <a id="callBtn" class="call-btn" href="#">📞 Call</a>
        <button class="called-btn" onclick="markCalled()">✓ Mark Called</button>
        <button class="prev-btn" onclick="previousMember()">⬅ Previous</button>
        <button class="next-btn" onclick="nextMember()">Next ➡</button>
    </div>

    <div class="status" id="callStatus"></div>
    <div class="progress" id="progress"></div>

</div>

</div>

<script>
let members = [];
let filteredMembers = [];
let currentIndex = 0;
let calledMembers = JSON.parse(localStorage.getItem("calledMembers") || "{}");

document.getElementById("excelFile").addEventListener("change", function(e){

    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){

        const data = new Uint8Array(event.target.result);

        const workbook = XLSX.read(data,{type:"array"});

        const sheetName = workbook.SheetNames[0];

        const worksheet = workbook.Sheets[sheetName];

        members = XLSX.utils.sheet_to_json(worksheet);

        filteredMembers = [...members];

        currentIndex = 0;

        if(filteredMembers.length){
            showMember();
        }
    };

    reader.readAsArrayBuffer(file);
});

document.getElementById("searchBox").addEventListener("input", function(){

    const query = this.value.toLowerCase();

    filteredMembers = members.filter(row =>
        Object.values(row).join(" ").toLowerCase().includes(query)
    );

    currentIndex = 0;

    if(filteredMembers.length){
        showMember();
    }
});

function showMember(){

    const card = document.getElementById("memberCard");

    card.style.display = "block";

    const member = filteredMembers[currentIndex];

    if(!member) return;

    let html = "";

    Object.keys(member).forEach(key=>{

        if(key.toLowerCase() !== "phone"){

            html += `
            <div class="info-row">
                <span class="label">${key}:</span>
                <span class="value">${member[key]}</span>
            </div>
            `;
        }
    });

    document.getElementById("memberDetails").innerHTML = html;

    let phone = "";

    for(const key in member){

        if(key.toLowerCase().includes("phone") ||
           key.toLowerCase().includes("mobile") ||
           key.toLowerCase().includes("number")){

            phone = String(member[key]).trim();
            break;
        }
    }

    document.getElementById("callBtn").href = `tel:${phone}`;

    const id = phone || currentIndex;

    document.getElementById("callStatus").innerHTML =
        calledMembers[id]
        ? '<span class="called">Called ✓</span>'
        : '<span class="notcalled">Not Called</span>';

    document.getElementById("progress").innerText =
        `Member ${currentIndex + 1} of ${filteredMembers.length}`;
}

function nextMember(){

    if(currentIndex < filteredMembers.length - 1){
        currentIndex++;
        showMember();
    }
}

function previousMember(){

    if(currentIndex > 0){
        currentIndex--;
        showMember();
    }
}

function markCalled(){

    const member = filteredMembers[currentIndex];

    let phone = "";

    for(const key in member){

        if(key.toLowerCase().includes("phone") ||
           key.toLowerCase().includes("mobile") ||
           key.toLowerCase().includes("number")){

            phone = String(member[key]).trim();
            break;
        }
    }

    calledMembers[phone] = true;

    localStorage.setItem(
        "calledMembers",
        JSON.stringify(calledMembers)
    );

    showMember();
}
</script>

</body>
</html>
